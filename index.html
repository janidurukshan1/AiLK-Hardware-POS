<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AiLK POS System</title>

  <link rel="stylesheet" href="style.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">

  <div class="login-card">

    <div class="spinner"></div>

    <h1>AiLK POS System</h1>

    <p class="sub-title">
      Shop Billing & Management
    </p>

    <input type="text" id="shopName" placeholder="Shop Name" />

    <input type="text" id="shopLocation" placeholder="Shop Location" />

    <input type="text" id="shopPhone" placeholder="Phone Number" />

    <input type="text" id="cashierName" placeholder="Cashier Name" />

    <button id="loginBtn">
      Login To POS
    </button>

    <p class="powered">
      Powered By AiLK
    </p>

  </div>

</div>

<!-- MAIN APP -->
<div class="app-container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo-box">
</html>
